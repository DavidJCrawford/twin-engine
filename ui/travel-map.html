<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
.tw-frame { background:#F0E6CF; border:1px solid #C6B287; border-radius:12px; padding:5px; }
.tw-inner { border:1px solid #D9CBA6; border-radius:8px; padding:16px 18px 14px; }
.tw-head { font-family:'IM Fell English SC',serif; font-size:26px; color:#3B3020; line-height:1.15; }
.tw-sub { font-family:'IM Fell English',serif; font-style:italic; font-size:14px; color:#6B5A3E; margin-top:1px; }
.tw-chips { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 10px; }
.tw-chip { font-family:'IM Fell English',serif; font-size:13px; color:#3B3020; border:1px solid #BCA97E; border-radius:6px; padding:3px 10px; background:#EBDFC2; }
.tw-chip i { font-style:normal; color:#6B5A3E; margin-right:5px; }
.tw-acts { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
button.tw-act { font-family:'IM Fell English',serif; font-size:14px; color:#5A2B20; background:#EBDFC2; border:1px solid #A98F5F; border-radius:6px; padding:6px 14px; cursor:pointer; height:auto; }
button.tw-act:hover { background:#E2D2AC; }
.tw-legend { display:flex; flex-wrap:wrap; gap:5px 16px; margin-top:10px; font-family:'IM Fell English',serif; font-size:12.5px; color:#6B5A3E; }
.tw-legend span { display:inline-flex; align-items:center; gap:6px; }
.tw-sw { width:11px; height:11px; border-radius:3px; display:inline-block; }
.hx { cursor:pointer; }
.hx:hover polygon { stroke:#3B3020; stroke-width:2.2; }
.plbl { font-family:'IM Fell English',serif; font-size:11.5px; fill:#3B3020; text-anchor:middle; paint-order:stroke; stroke:rgba(240,230,207,.85); stroke-width:3px; pointer-events:none; }
</style>
<div id="tw-root"></div>
<script>
const STATE = /*__STATE__*/null;

const DEMO_STATE = {
  location: "Barrowford",
  date: "First day of Frostfall, 1211",
  weather: "Clear and cold; woodsmoke hangs over the thatch",
  grid: {
    cols: 9, rows: 6,
    terrain: ["mmmhhffFF","mhhhpffFF","hhpvppfff","pppccpffh","wwpppsssd","wwwpssssh"],
    rivers: [{r:0,c:2,k:"src",rot:5},{r:1,c:1,k:"e180",rot:2},{r:2,c:1,k:"e120",rot:5,flip:true},{r:3,c:1,k:"e120",rot:1}],
    explored: ["2,1","2,2","2,3","3,0","3,1","3,2","3,3","3,4","4,1","4,2","4,3","5,3"]
  },
  pois: [
    {r:0,c:1,name:"The Saddle",glyph:"site",known:false},
    {r:0,c:4,name:"Greywatch Keep",glyph:"keep",known:true},
    {r:1,c:6,name:"Hart of Silverwood",glyph:"site",known:true},
    {r:2,c:4,name:"The Old Mill",glyph:"town",known:false},
    {r:3,c:2,name:"Barrowford",glyph:"town",known:true},
    {r:3,c:8,name:"Emberdelve Mine",glyph:"mine",known:true},
    {r:4,c:6,name:"Drowned Chapel",glyph:"ruin",known:false},
    {r:5,c:3,name:"Nen's Rest",glyph:"town",known:false}
  ],
  player: {r:3,c:2},
  route: null,
  stats: [
    {label:"Season",value:"Frostfall"},
    {label:"Supplies",value:"6 days"},
    {label:"Weariness",value:"rested"},
    {label:"Company",value:"alone"}
  ],
  actions: [
    {label:"Ask for news at the inn", prompt:"Ask for news at the inn in Barrowford."},
    {label:"Visit the market", prompt:"Visit the Barrowford market before setting out."},
    {label:"Set out at dawn", prompt:"I want to set out at dawn. What roads are open to me?"}
  ]
};

(function(){
  const S = STATE || DEMO_STATE;
  const say = t => (typeof sendPrompt === "function" ? sendPrompt(t) : console.log("[sendPrompt]", t));
  const TER = {
    p:{f:"#DDE0B5",n:"open plains"}, f:{f:"#AEC08B",n:"forest"},
    F:{f:"#9BB176",n:"dense forest"}, h:{f:"#E3CB9B",n:"hill country"},
    m:{f:"#C9BBA3",n:"high mountains"}, s:{f:"#BCCDB4",n:"marshland"},
    w:{f:"#AAC5C6",n:"lake waters"}, d:{f:"#EBDCAC",n:"desert sands"},
    v:{f:"#DEDCA6",n:"village"}, c:{f:"#E1D7BF",n:"city"}
  };
  const INK="#3B3020", RED="#8E3B2F", FOG="#EFE4CB", FOGLINE="#CDBB92";
  const R=34, HW=Math.sqrt(3)*R, VS=1.5*R, MX=14, MY=12;
  const cols=S.grid.cols, rows=S.grid.rows;
  const W=Math.round(MX*2+cols*HW+HW/2), H=Math.round(MY*2+2*R+(rows-1)*VS+14);
  const ctr=(r,c)=>[MX+HW/2+c*HW+(r%2?HW/2:0), MY+R+r*VS];
  const cname=(r,c)=>String.fromCharCode(65+c)+(r+1);
  const expl = S.grid.explored==="all" ? null : new Set(S.grid.explored);
  const isExp=(r,c)=> !expl || expl.has(r+","+c);
  const poiAt={}; S.pois.forEach(p=>poiAt[p.r+","+p.c]=p);
  const terAt=(rr,cc)=>(rr>=0&&rr<rows&&cc>=0&&cc<cols)?S.grid.terrain[rr][cc]:null;
  const corner=(cx,cy,i)=>{const a=Math.PI/180*(60*i-30);return[cx+R*0.965*Math.cos(a),cy+R*0.965*Math.sin(a)];};
  const corners=(cx,cy)=>{let a=[];for(let i=0;i<6;i++){const p=corner(cx,cy,i);
    a.push(p[0].toFixed(1)+","+p[1].toFixed(1));}return a.join(" ");};
  const RIVERS={
    p2p:"M 0 -34 C 3 -22 -3 -12 0 0 C 3 12 -3 22 0 34",
    e180:"M -29.4 0 C -18 -7 -8 6 2 0 C 12 -6 20 5 29.4 0",
    e120:"M -29.4 0 C -12 -3 -2 4 4 12 C 8 18 11 21 14.7 25.5",
    e60:"M -29.4 0 C -16 -2 -6 4 -6 12 C -6 19 -10 22 -14.7 25.5",
    src:"M -29.4 0 C -21 -4 -13 3 -5 0.5"
  };
  const SRC_WIDE="M -29.4 0 C -23 -3 -17 2 -12 0.8";
  const riverSvg=(k,rot,flip,cx,cy)=>{
    const d=RIVERS[k]; if(!d) return "";
    const wd=(k==="src")?SRC_WIDE:d;
    const tr='translate('+cx+' '+cy+') rotate('+((rot||0)*60)+')'+(flip?' scale(-1 1)':'');
    return '<g transform="'+tr+'" pointer-events="none">'+
      '<path d="'+wd+'" fill="none" stroke="#8FB4B8" stroke-width="3.4" stroke-linecap="round"/>'+
      '<path d="'+d+'" fill="none" stroke="#48727B" stroke-width="1.5" stroke-linecap="round"/></g>';
  };

  function glyph(g,cx,cy,ink){
    if(g==="town") return '<rect x="'+(cx-4.5)+'" y="'+(cy-7.5)+'" width="9" height="9" fill="'+ink+'"/>';
    if(g==="keep") return '<path d="M'+(cx-5.5)+' '+(cy+2)+' L'+cx+' '+(cy-8)+' L'+(cx+5.5)+' '+(cy+2)+' Z" fill="'+ink+'"/>';
    if(g==="mine") return '<path d="M'+cx+' '+(cy-9)+' L'+(cx+5)+' '+(cy-3)+' L'+cx+' '+(cy+3)+' L'+(cx-5)+' '+(cy-3)+' Z" fill="'+ink+'"/>';
    if(g==="ruin") return '<path d="M'+(cx-5)+' '+(cy-8)+' L'+(cx+5)+' '+(cy+2)+' M'+(cx+5)+' '+(cy-8)+' L'+(cx-5)+' '+(cy+2)+'" stroke="'+ink+'" stroke-width="2.2" fill="none"/>';
    return '<circle cx="'+cx+'" cy="'+(cy-3)+'" r="4" fill="'+ink+'"/>';
  }

  function rngFor(hr,hc){let s=((hr*73856093)^(hc*19349663)^0x9e3779b9)>>>0;return()=>{s=(s*1103515245+12345)>>>0;return s/4294967296;};}
  function deco(t,cx,cy,hr,hc,terAt2){
    const INKD="rgba(45,36,22,0.82)";
    const rnd=rngFor(hr,hc), jit=a=>(rnd()-0.5)*a;
    let out="";
    const S2=(d,w,fill)=>{out+='<path d="'+d+'" fill="'+(fill||"none")+'" stroke="'+INKD+'" stroke-width="'+(w||1)+'" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>';};
    const dot=(x,y,r2)=>{out+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(r2||0.7)+'" fill="'+INKD+'" pointer-events="none"/>';};
    const F=n=>n.toFixed(1);

    const peak=(x,y,s,fill)=>{
      const bl=x-s*(0.9+rnd()*0.25), br=x+s*(0.85+rnd()*0.25), by=y+s*0.6;
      const ax=x-s*0.12+jit(s*0.3), ay=y-s*(0.75+rnd()*0.25);
      const kx=(bl+ax)/2+jit(s*0.2), ky=(by+ay)/2+s*jit(0.24);
      let d="M"+F(bl)+" "+F(by)+" L"+F(kx)+" "+F(ky)+" L"+F(ax)+" "+F(ay);
      if(rnd()>0.3){
        d+=" L"+F(x+s*(0.05+rnd()*0.1))+" "+F(y-s*(0.3+rnd()*0.2))+
           " L"+F(x+s*(0.28+rnd()*0.15))+" "+F(y-s*(0.45+rnd()*0.2));
      }
      d+=" L"+F(br)+" "+F(by);
      S2(d,1.1,fill);
      const nh=2+Math.floor(rnd()*2);
      for(let k=0;k<nh;k++){
        const f=0.3+k*(0.45/nh)+jit(0.08);
        const px=ax+(br-ax)*f, py=ay+(by-ay)*f;
        S2("M"+F(px)+" "+F(py)+" l "+F(-s*(0.16+rnd()*0.1))+" "+F(s*(0.2+rnd()*0.1)),0.8);
      }
    };
    const hillArc=(x,y,b,fill)=>{
      S2("M"+F(x-b*(0.9+rnd()*0.25))+" "+F(y)+" Q "+F(x+jit(b*0.6))+" "+F(y-b*(1.05+rnd()*0.35))+" "+F(x+b*(0.9+rnd()*0.25))+" "+F(y),1.05,fill);
      if(rnd()>0.25) S2("M"+F(x+b*(0.15+jit(0.1)))+" "+F(y-b*(0.3+rnd()*0.2))+" L"+F(x+b*(0.45+rnd()*0.2))+" "+F(y-b*0.06),0.8);
      if(rnd()>0.5) S2("M"+F(x+jit(2))+" "+F(y-b*(0.5+rnd()*0.15))+" L"+F(x+b*(0.25+jit(0.1)))+" "+F(y-b*0.25),0.8);
    };
    const pine=(x,y,h,fill)=>{
      const w=h*(0.44+rnd()*0.18), ln=jit(h*0.24);
      const t1=0.52+jit(0.12), t2=0.14+jit(0.1);
      const lw1=0.5+rnd()*0.16, lw2=0.76+rnd()*0.14;
      S2("M"+F(x+ln)+" "+F(y-h)+
        " L"+F(x-w*lw1+ln*0.6)+" "+F(y-h*t1)+" L"+F(x-w*0.26+ln*0.6)+" "+F(y-h*t1)+
        " L"+F(x-w*lw2+ln*0.25)+" "+F(y-h*t2)+" L"+F(x-w*0.4+ln*0.25)+" "+F(y-h*t2)+
        " L"+F(x-w)+" "+F(y+h*0.24)+" L"+F(x+w)+" "+F(y+h*0.24)+
        " L"+F(x+w*0.4+ln*0.25)+" "+F(y-h*t2)+" L"+F(x+w*lw2+ln*0.25)+" "+F(y-h*t2)+
        " L"+F(x+w*0.26+ln*0.6)+" "+F(y-h*t1)+" L"+F(x+w*lw1+ln*0.6)+" "+F(y-h*t1)+" Z",0.85,fill);
      S2("M"+F(x+ln*0.15)+" "+F(y+h*0.24)+" l 0 "+F(Math.min(3,h*0.3)),0.85);
    };
    const broad=(x,y,s,fill)=>{
      S2("M"+F(x-s)+" "+F(y)+
        " Q "+F(x-s*1.15)+" "+F(y-s*0.75)+" "+F(x-s*0.3)+" "+F(y-s*0.85)+
        " Q "+F(x-s*0.05)+" "+F(y-s*1.35)+" "+F(x+s*0.5)+" "+F(y-s*0.8)+
        " Q "+F(x+s*1.25)+" "+F(y-s*0.7)+" "+F(x+s*0.95)+" "+F(y-s*0.05)+
        " Q "+F(x+s*0.75)+" "+F(y+s*0.3)+" "+F(x+s*0.2)+" "+F(y+s*0.12)+
        " Q "+F(x-s*0.4)+" "+F(y+s*0.35)+" "+F(x-s)+" "+F(y)+" Z",0.85,fill);
      S2("M"+F(x)+" "+F(y+s*0.2)+" l 0 "+F(s*0.6),0.85);
    };
    const tuft=(x,y)=>{
      const g=1.3+rnd()*1.1, ext=6.5+rnd()*2;
      S2("M"+F(x-ext-1)+" "+F(y)+" L"+F(x-g)+" "+F(y),0.85);
      S2("M"+F(x+g)+" "+F(y)+" L"+F(x+ext+1)+" "+F(y),0.85);
      const nb=3+Math.floor(rnd()*3);
      for(let i=0;i<nb;i++){
        const fx=(nb>1)?((i-(nb-1)/2)/((nb-1)/2)):0;
        const bx=x+fx*(2+rnd()), len=4.5+rnd()*2.2;
        S2("M"+F(bx)+" "+F(y)+" L"+F(bx+fx*(1.5+rnd()*1.6)+jit(0.8))+" "+F(y-len),0.85);
      }
      dot(x-9.5+jit(2),y+1,0.6); dot(x+9.5+jit(2),y+0.5,0.6);
    };
    const ripple=(x,y,len)=>{
      const a1=1.6+rnd()*1.4, l1=len*(0.42+rnd()*0.16);
      S2("M"+F(x)+" "+F(y)+" q "+F(l1*0.5)+" "+F(-a1)+" "+F(l1)+" 0 q "+F((len-l1)*0.5)+" "+F(a1*0.9)+" "+F(len-l1)+" 0",0.85);
    };
    const house=(x,y,s)=>{
      const a=s*(0.95+rnd()*0.4), hw=s*(0.7+rnd()*0.4), hr2=s*(0.7+rnd()*0.55), rx=jit(s*0.8);
      const j2=()=>jit(1);
      out+='<path d="M'+F(x-a+j2())+' '+F(y+j2()*0.5)+
        ' L'+F(x-a+j2())+' '+F(y-hw+j2())+
        ' L'+F(x+rx)+' '+F(y-hw-hr2+j2())+
        ' L'+F(x+a+j2())+' '+F(y-hw+j2())+
        ' L'+F(x+a+j2())+' '+F(y+j2()*0.5)+' Z" fill="'+INKD+'" pointer-events="none"/>';
    };
    const tower=(x,y,s)=>{
      const a=s*(0.6+rnd()*0.25), ht=s*(2.2+rnd()*0.8), rt=s*(0.6+rnd()*0.5);
      out+='<path d="M'+F(x-a)+' '+F(y)+' L'+F(x-a+jit(1))+' '+F(y-ht)+' L'+F(x+jit(1.2))+' '+F(y-ht-rt)+' L'+F(x+a+jit(1))+' '+F(y-ht)+' L'+F(x+a)+' '+F(y)+' Z" fill="'+INKD+'" pointer-events="none"/>';
      S2("M"+F(x)+" "+F(y-ht-rt)+" L"+F(x+s*(1.2+rnd()*0.5))+" "+F(y-ht-rt+s*0.4),0.7);
    };

    if(t==="m"){
      const f=TER.m.f;
      peak(cx+jit(5), cy-3+jit(4), 12.5+rnd()*3.5, f);
      peak(cx-9+jit(4), cy+8+jit(3), 8+rnd()*2.5, f);
      if(rnd()>0.6) hillArc(cx+11+jit(4), cy+10+jit(2), 4.5+rnd(), f);
    } else if(t==="h"){
      hillArc(cx-8+jit(7), cy-6+jit(4), 6+rnd()*2.6, TER.h.f);
      hillArc(cx+9+jit(7), cy-2+jit(4), 6.5+rnd()*2.6, TER.h.f);
      if(rnd()>0.15) hillArc(cx+jit(9), cy+9+jit(4), 5.5+rnd()*2.4, TER.h.f);
    } else if(t==="f"||t==="F"){
      const dense=(t==="F"), fl=TER[t].f;
      const n=(dense?10:6)+Math.floor(rnd()*3), pts=[];
      for(let i=0;i<n;i++) pts.push([cx+jit(R*(dense?1.2:1.05)), cy+jit(R*(dense?1:0.85))]);
      pts.sort((a,b)=>a[1]-b[1]);
      for(const [x,y] of pts){
        const h=(dense?7.5:7)+((y-cy)/R+0.5)*3+rnd()*1.5;
        if(rnd()<(dense?0.07:0.12)) broad(x,y,h*0.42,fl); else pine(x,y,h,fl);
      }
    } else if(t==="d"){
      const n=2+(rnd()>0.5?1:0);
      for(let i=0;i<n;i++){
        const x=cx+jit(24), y=cy-5+i*9+jit(4), b=7+rnd()*3.5;
        S2("M"+F(x-b)+" "+F(y)+" Q "+F(x+jit(3))+" "+F(y-b*(0.45+rnd()*0.2))+" "+F(x+b)+" "+F(y)+" q "+F(b*0.25)+" "+F(0.6+rnd()*0.6)+" "+F(b*0.5)+" "+F(0.9),0.9,TER.d.f);
      }
      for(let i=0;i<2;i++){
        const x=cx+jit(26), y=cy+jit(16);
        dot(x,y,0.55); dot(x+3+jit(1),y+1.5,0.5); dot(x+6+jit(1),y-0.5,0.55); dot(x+1.5,y+3.5,0.45);
      }
    } else if(t==="s"){
      const n=2+(rnd()>0.55?1:0);
      for(let i=0;i<n;i++) tuft(cx+jit(28), cy-6+i*10+jit(4));
    } else if(t==="w"){
      const DIRS=(hr%2===0)
        ? {0:[hr,hc+1],1:[hr+1,hc],2:[hr+1,hc-1],3:[hr,hc-1],4:[hr-1,hc-1],5:[hr-1,hc]}
        : {0:[hr,hc+1],1:[hr+1,hc+1],2:[hr+1,hc],3:[hr,hc-1],4:[hr-1,hc],5:[hr-1,hc+1]};
      let coastCount=0;
      for(let e=0;e<6;e++){
        const nb=DIRS[e], nt=terAt2?terAt2(nb[0],nb[1]):null;
        if(!nt||nt==="w") continue;
        coastCount++;
        const p1=corner(cx,cy,e), p2=corner(cx,cy,(e+1)%6);
        const mx=(p1[0]+p2[0])/2, my=(p1[1]+p2[1])/2;
        const vx=(cx-mx), vy=(cy-my), vl=Math.hypot(vx,vy);
        const ux=vx/vl, uy=vy/vl;
        const bul=1+rnd()*2.2;
        S2("M"+F(p1[0])+" "+F(p1[1])+" Q "+F(mx-ux*bul)+" "+F(my-uy*bul)+" "+F(p2[0])+" "+F(p2[1]),1.6);
        for(let k=1;k<=2;k++){
          const ox=ux*4.2*k, oy=uy*4.2*k;
          const shr=0.08+0.12*k;
          const q1=[p1[0]+(p2[0]-p1[0])*shr+ox, p1[1]+(p2[1]-p1[1])*shr+oy];
          const q2=[p2[0]+(p1[0]-p2[0])*shr+ox, p2[1]+(p1[1]-p2[1])*shr+oy];
          S2("M"+F(q1[0])+" "+F(q1[1])+" Q "+F((q1[0]+q2[0])/2+ux*1.1)+" "+F((q1[1]+q2[1])/2+uy*1.1)+" "+F(q2[0])+" "+F(q2[1]),0.8);
        }
      }
      const nrip=coastCount>3?1:2;
      for(let i=0;i<nrip;i++){const len=18+rnd()*6; ripple(cx-len*0.55+jit(5), cy-5+i*8+jit(3), len);}
    } else if(t==="p"){
      if(rnd()<0.75){
        const x=cx+jit(24), y=cy+jit(14), l1=3+rnd()*1.4;
        S2("M"+F(x)+" "+F(y)+" q "+F(jit(1.4))+" "+F(-l1*0.75)+" "+F(jit(1))+" "+F(-l1)+
          " M"+F(x-2.4)+" "+F(y)+" q -1 -1.8 "+F(-1.5-rnd())+" "+F(-1.9-rnd())+
          " M"+F(x+2.4)+" "+F(y)+" q 1 -1.8 "+F(1.5+rnd())+" "+F(-1.9-rnd()),0.75);
      }
      if(rnd()<0.7){const x=cx+jit(24), y=cy+jit(14); dot(x,y,0.6); dot(x+3.5,y+1,0.55); dot(x+7,y-0.6,0.6); dot(x+1.5,y+2.6,0.5);}
      if(rnd()<0.35){const x=cx+jit(22), y=cy+jit(13); dot(x,y,0.55); dot(x+3,y-1,0.5);}
    } else if(t==="v"){
      S2("M"+F(cx-19)+" "+F(cy+8+jit(3))+" Q "+F(cx+jit(6))+" "+F(cy-2+jit(3))+" "+F(cx+19)+" "+F(cy+6+jit(3)),0.75);
      house(cx-11+jit(3), cy+3+jit(2), 4+rnd()*0.8);
      house(cx+1+jit(3), cy-5+jit(2), 3.8+rnd()*0.8);
      house(cx+12+jit(3), cy+2+jit(2), 4+rnd()*0.9);
      house(cx-2+jit(3), cy+13+jit(2), 3.6+rnd()*0.8);
      dot(cx+16+jit(3), cy-10+jit(2), 0.6); dot(cx-15+jit(3), cy+12+jit(2), 0.6);
    } else if(t==="c"){
      S2("M"+F(cx-17)+" "+F(cy+8+jit(2))+" L"+F(cx+17)+" "+F(cy+9+jit(2)),0.6);
      S2("M"+F(cx-15)+" "+F(cy-6+jit(2))+" L"+F(cx+15)+" "+F(cy-7+jit(2)),0.6);
      const cells=[[-14,-11],[1,-13],[13,-9],[-15,2],[-1,-1],[12,3],[-8,14],[5,15]];
      for(const cell of cells){
        if(rnd()<0.12) continue;
        const x=cx+cell[0]+jit(3), y=cy+cell[1]+jit(3);
        if(rnd()<0.22) tower(x,y,3+rnd()*0.9); else house(x,y,3.4+rnd()*1.4);
      }
    }
    return out;
  }

  let hexes="", marks="";
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const [cx,cy]=ctr(r,c), key=r+","+c, exp=isExp(r,c), p=poiAt[key];
    const t=TER[S.grid.terrain[r][c]];
    const fill = exp ? t.f : FOG;
    const stroke = exp ? "#A99263" : FOGLINE;
    const dash = exp ? "" : ' stroke-dasharray="2 4"';
    const tip = exp ? ((p?p.name+" — ":"")+t.n+" (hex "+cname(r,c)+")")
                    : ((p&&p.known?p.name+" — by rumour only — ":"")+"uncharted (hex "+cname(r,c)+")");
    const showPoi = p && (exp || p.known);
    hexes += '<g class="hx" data-k="'+key+'"><title>'+tip+'</title>'+
      '<polygon points="'+corners(cx,cy)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1"'+dash+'/>'+
      (exp && !showPoi ? deco(S.grid.terrain[r][c],cx,cy,r,c,terAt) : "")+'</g>';
    if(showPoi){
      const fade = exp ? "" : ' opacity="0.45"';
      const isYou = S.player.r===r && S.player.c===c;
      marks += '<g pointer-events="none"'+fade+'>'+
        (isYou ? '<circle cx="'+cx+'" cy="'+(cy-3)+'" r="8" fill="none" stroke="'+RED+'" stroke-width="2"/>' : "")+
        glyph(p.glyph,cx,cy,isYou?RED:INK)+
        '<text class="plbl" x="'+cx+'" y="'+(cy+15)+'">'+p.name+'</text></g>';
    }
  }
  if(!poiAt[S.player.r+","+S.player.c]){
    const [px,py]=ctr(S.player.r,S.player.c);
    marks += '<g pointer-events="none"><circle cx="'+px+'" cy="'+(py-3)+'" r="8" fill="none" stroke="'+RED+'" stroke-width="2"/><circle cx="'+px+'" cy="'+(py-3)+'" r="3.5" fill="'+RED+'"/></g>';
  }

  let rivers="";
  (S.grid.rivers||[]).forEach(rv=>{
    if(!isExp(rv.r,rv.c)) return;
    const [rx,ry]=ctr(rv.r,rv.c);
    rivers+=riverSvg(rv.k,rv.rot,rv.flip,rx,ry);
  });

  let route="";
  if(S.route && S.route.length>1){
    const pts=S.route.map(h=>ctr(h[0],h[1]).map(v=>v.toFixed(1)).join(",")).join(" ");
    const [ex,ey]=ctr(S.route[S.route.length-1][0],S.route[S.route.length-1][1]);
    route='<polyline points="'+pts+'" fill="none" stroke="'+RED+'" stroke-width="2" stroke-dasharray="5 5" stroke-linecap="round" pointer-events="none"/>'+
      '<circle cx="'+ex+'" cy="'+ey+'" r="6" fill="none" stroke="'+RED+'" stroke-width="1.6" pointer-events="none"/>';
  }

  const compass='<g pointer-events="none" stroke="'+INK+'" fill="'+INK+'">'+
    '<line x1="'+(W-12)+'" y1="36" x2="'+(W-12)+'" y2="14" stroke-width="1.4"/>'+
    '<path d="M'+(W-12)+' 10 L'+(W-16)+' 19 L'+(W-8)+' 19 Z" stroke="none"/>'+
    '<text x="'+(W-12)+'" y="50" font-size="12" text-anchor="middle" font-family="IM Fell English SC,serif" stroke="none">N</text></g>';

  const notYou=S.player, curPoi=poiAt[notYou.r+","+notYou.c];
  const chips=(S.stats||[]).map(s=>'<span class="tw-chip"><i>'+s.label+'</i>'+s.value+'</span>').join("");
  const acts=(S.actions||[]).map((a,i)=>'<button class="tw-act" data-i="'+i+'">'+a.label+' &#8599;</button>').join("");
  const legend=(expl?'<span><span class="tw-sw" style="background:'+FOG+';border:1px dashed '+FOGLINE+'"></span>uncharted country</span>':"")+
    '<span style="opacity:.8">Click a hex to set your course &#8599;</span>';

  document.getElementById("tw-root").innerHTML =
    '<div class="tw-frame"><div class="tw-inner">'+
    '<div class="tw-head">'+S.location+'</div>'+
    '<div class="tw-sub">'+S.date+' &middot; '+S.weather+'</div>'+
    '<div class="tw-chips">'+chips+'</div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Hex map of the lands around '+S.location+'" style="width:100%;height:auto;display:block">'+
    hexes+rivers+route+marks+compass+'</svg>'+
    '<div class="tw-legend">'+legend+'</div>'+
    '<div class="tw-acts">'+acts+'</div>'+
    '</div></div>';

  document.querySelectorAll("#tw-root .hx").forEach(g=>g.addEventListener("click",()=>{
    const [r,c]=g.dataset.k.split(",").map(Number), cn=cname(r,c), p=poiAt[r+","+c];
    if(S.player.r===r && S.player.c===c){ say("Tell me what is stirring here"+(p?" in "+p.name:"")+"."); return; }
    if(!isExp(r,c) && !(p&&p.known)){ say("Set course for hex "+cn+", into uncharted country. Plot the route and present my embarkation choices."); return; }
    if(p){ say("Set course for "+p.name+" (hex "+cn+"). Plot the route and present my embarkation choices."); return; }
    say("Set course for hex "+cn+", the "+TER[S.grid.terrain[r][c]].n+" there. Plot the route and present my embarkation choices.");
  }));
  document.querySelectorAll("#tw-root .tw-act").forEach(b=>b.addEventListener("click",()=>say(S.actions[+b.dataset.i].prompt)));
})();
</script>
