<!doctype html>
<meta charset="utf-8">
<title>Twin terrain lab</title>
<style>
body{background:#F0E6CF;font-family:Georgia,serif;color:#3B3020;margin:18px}
h3{margin:0 0 10px;font-weight:normal}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.sw{border:1px solid #C6B287;border-radius:8px;background:#F0E6CF;text-align:center;font-size:12px;padding:4px}
</style>
<h3>Terrain lab — deco v2</h3>
<div class="row" id="swatches"></div>
<div id="map"></div>
<script>
const FILLS={p:"#DDE0B5",f:"#AEC08B",F:"#9BB176",h:"#E3CB9B",m:"#C9BBA3",s:"#BCCDB4",w:"#AAC5C6",d:"#EBDCAC",v:"#DEDCA6",c:"#E1D7BF"};
const ROWS=["mmmhhffFF","mhhhpffFF","hhpvppfff","pppccpffh","wwpppsssd","wwwpssssh"];
const RIVERS={
  p2p:"M 0 -34 C 3 -22 -3 -12 0 0 C 3 12 -3 22 0 34",
  e180:"M -29.4 0 C -18 -7 -8 6 2 0 C 12 -6 20 5 29.4 0",
  e120:"M -29.4 0 C -12 -3 -2 4 4 12 C 8 18 11 21 14.7 25.5",
  e60:"M -29.4 0 C -16 -2 -6 4 -6 12 C -6 19 -10 22 -14.7 25.5",
  src:"M -29.4 0 C -21 -4 -13 3 -5 0.5"
};
const SRC_WIDE="M -29.4 0 C -23 -3 -17 2 -12 0.8";
const LABRIV=[{r:0,c:2,k:"src",rot:5},{r:1,c:1,k:"e180",rot:2},{r:2,c:1,k:"e120",rot:5,flip:true},{r:3,c:1,k:"e120",rot:1}];
const ROADS={
  p2p:"M 0 -34 C 2 -20 -2 -14 0 0 C 2 14 -2 20 0 34",
  e180:"M -29.4 0 C -16 -3 -6 3 2 0 C 10 -3 20 2 29.4 0",
  e120:"M -29.4 0 C -14 -2 -4 3 3 11 C 7 17 11 21 14.7 25.5",
  e60:"M -29.4 0 C -17 -1 -7 3 -6.5 11 C -6.5 18 -10 22 -14.7 25.5",
  src:"M -29.4 0 C -21 -2 -12 2 -2 0.5"
};
const LABROAD=[{r:3,c:0,k:"e180"},{r:3,c:1,k:"e180"},{r:3,c:2,k:"e180"},{r:3,c:3,k:"e180"},{r:3,c:4,k:"e180"},{r:3,c:5,k:"src"}];
function roadSvg(k,rot,flip,cx,cy){
  const d=ROADS[k]; if(!d) return "";
  const tr='translate('+cx+' '+cy+') rotate('+((rot||0)*60)+')'+(flip?' scale(-1 1)':'');
  return '<g transform="'+tr+'" pointer-events="none"><path d="'+d+'" fill="none" stroke="#6B5A3E" stroke-width="1.8" stroke-dasharray="0.5 5.5" stroke-linecap="round"/></g>';
}
const LABCOAST=[{r:3,c:0,style:"beach",edges:[1,2]},{r:4,c:2,style:"beach",edges:[2,3]},{r:5,c:3,style:"cliff",edges:[3]}];
function coastSvg(style,edges,cx,cy,hr,hc){
  let o="";
  for(const e of edges){
    const rnd=rngFor(hr*3+e*17, hc*5+e*29);
    const p1=corner(cx,cy,e%6), p2=corner(cx,cy,(e+1)%6);
    const mx=(p1[0]+p2[0])/2, my=(p1[1]+p2[1])/2;
    const vx=cx-mx, vy=cy-my, vl=Math.hypot(vx,vy);
    const ux=vx/vl, uy=vy/vl;
    if(style==="beach"){
      const d=8.5+rnd()*2;
      o+='<path d="M'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+' L'+p2[0].toFixed(1)+' '+p2[1].toFixed(1)+
        ' Q '+(mx+ux*d).toFixed(1)+' '+(my+uy*d).toFixed(1)+' '+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+
        ' Z" fill="#F0E0A4" pointer-events="none"/>';
      o+='<path d="M'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+
        ' Q '+(mx+ux*d).toFixed(1)+' '+(my+uy*d).toFixed(1)+' '+p2[0].toFixed(1)+' '+p2[1].toFixed(1)+
        '" fill="none" stroke="rgba(140,115,65,0.55)" stroke-width="0.8" stroke-dasharray="3 2.6" stroke-linecap="round" pointer-events="none"/>';
      const nd=8+Math.floor(rnd()*4);
      for(let i=0;i<nd;i++){
        const t=0.1+0.8*rnd(), off=1.2+rnd()*(d*0.6);
        const x=p1[0]+(p2[0]-p1[0])*t+ux*off, y=p1[1]+(p2[1]-p1[1])*t+uy*off;
        o+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(0.5+rnd()*0.3).toFixed(2)+'" fill="rgba(130,105,58,0.75)" pointer-events="none"/>';
      }
    } else {
      const ins=1.5;
      const q1=[p1[0]+ux*ins,p1[1]+uy*ins], q2=[p2[0]+ux*ins,p2[1]+uy*ins];
      o+='<path d="M'+q1[0].toFixed(1)+' '+q1[1].toFixed(1)+
        ' Q '+(mx+ux*(ins+1+rnd()*1.5)).toFixed(1)+' '+(my+uy*(ins+1+rnd()*1.5)).toFixed(1)+' '+q2[0].toFixed(1)+' '+q2[1].toFixed(1)+
        '" fill="none" stroke="rgba(45,36,22,0.85)" stroke-width="1.8" stroke-linecap="round" pointer-events="none"/>';
      const nt=4+Math.floor(rnd()*2);
      for(let i=0;i<nt;i++){
        const t=0.12+0.76*(i/(nt-1))+(rnd()-0.5)*0.06;
        const bx=q1[0]+(q2[0]-q1[0])*t, by=q1[1]+(q2[1]-q1[1])*t;
        const len=3+rnd()*1.8;
        o+='<path d="M'+bx.toFixed(1)+' '+by.toFixed(1)+' l '+(-ux*len).toFixed(1)+' '+(-uy*len).toFixed(1)+
          '" stroke="rgba(45,36,22,0.85)" stroke-width="1" stroke-linecap="round" fill="none" pointer-events="none"/>';
      }
    }
  }
  return o;
}
function riverSvg(k,rot,flip,cx,cy){
  const d=RIVERS[k]; if(!d) return "";
  const wd=(k==="src")?SRC_WIDE:d;
  const tr='translate('+cx+' '+cy+') rotate('+((rot||0)*60)+')'+(flip?' scale(-1 1)':'');
  return '<g transform="'+tr+'" pointer-events="none">'+
    '<path d="'+wd+'" fill="none" stroke="#8FB4B8" stroke-width="3.4" stroke-linecap="round"/>'+
    '<path d="'+d+'" fill="none" stroke="#48727B" stroke-width="1.5" stroke-linecap="round"/></g>';
}
const R=34,HW=Math.sqrt(3)*R,VS=1.5*R,MX=14,MY=12,COLS=9,NR=6;
const ctr=(r,c)=>[MX+HW/2+c*HW+(r%2?HW/2:0),MY+R+r*VS];
const corner=(cx,cy,i)=>{const a=Math.PI/180*(60*i-30);return[cx+R*0.965*Math.cos(a),cy+R*0.965*Math.sin(a)];};
const hexPts=(cx,cy)=>{let a=[];for(let i=0;i<6;i++){const p=corner(cx,cy,i);a.push(p[0].toFixed(1)+","+p[1].toFixed(1));}return a.join(" ");};
const terAt=(r,c)=>(r>=0&&r<NR&&c>=0&&c<COLS)?ROWS[r][c]:null;

// === DECO v2 ===
const INKD="rgba(45,36,22,0.82)";
function rngFor(hr,hc){let s=((hr*73856093)^(hc*19349663)^0x9e3779b9)>>>0;return()=>{s=(s*1103515245+12345)>>>0;return s/4294967296;};}
function deco(t,cx,cy,hr,hc,terAt2){
  const rnd=rngFor(hr,hc), jit=a=>(rnd()-0.5)*a;
  let out="";
  const S=(d,w,fill)=>{out+='<path d="'+d+'" fill="'+(fill||"none")+'" stroke="'+INKD+'" stroke-width="'+(w||1)+'" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>';};
  const dot=(x,y,r2)=>{out+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(r2||0.7)+'" fill="'+INKD+'" pointer-events="none"/>';};
  const F=n=>n.toFixed(1);

  const peak=(x,y,s,fill)=>{
    const bl=x-s*(0.9+rnd()*0.25), br=x+s*(0.85+rnd()*0.25), by=y+s*0.6;
    const ax=x-s*0.12+jit(s*0.3), ay=y-s*(0.75+rnd()*0.25);
    const kx=(bl+ax)/2+jit(s*0.2), ky=(by+ay)/2+s*jit(0.24);
    let d="M"+F(bl)+" "+F(by)+" L"+F(kx)+" "+F(ky)+" L"+F(ax)+" "+F(ay);
    if(rnd()>0.3){
      d+=" L"+F(x+s*(0.05+rnd()*0.1))+" "+F(y-s*(0.3+rnd()*0.2))+
         " L"+F(x+s*(0.28+rnd()*0.15))+" "+F(y-s*(0.45+rnd()*0.2));
    }
    d+=" L"+F(br)+" "+F(by);
    S(d,1.1,fill);
    const nh=2+Math.floor(rnd()*2);
    for(let k=0;k<nh;k++){
      const f=0.3+k*(0.45/nh)+jit(0.08);
      const px=ax+(br-ax)*f, py=ay+(by-ay)*f;
      S("M"+F(px)+" "+F(py)+" l "+F(-s*(0.16+rnd()*0.1))+" "+F(s*(0.2+rnd()*0.1)),0.8);
    }
  };
  const hillArc=(x,y,b,fill)=>{
    S("M"+F(x-b*(0.9+rnd()*0.25))+" "+F(y)+" Q "+F(x+jit(b*0.6))+" "+F(y-b*(1.05+rnd()*0.35))+" "+F(x+b*(0.9+rnd()*0.25))+" "+F(y),1.05,fill);
    if(rnd()>0.25) S("M"+F(x+b*(0.15+jit(0.1)))+" "+F(y-b*(0.3+rnd()*0.2))+" L"+F(x+b*(0.45+rnd()*0.2))+" "+F(y-b*0.06),0.8);
    if(rnd()>0.5) S("M"+F(x+jit(2))+" "+F(y-b*(0.5+rnd()*0.15))+" L"+F(x+b*(0.25+jit(0.1)))+" "+F(y-b*0.25),0.8);
  };
  const pine=(x,y,h,fill)=>{
    const w=h*(0.44+rnd()*0.18), ln=jit(h*0.24);
    const t1=0.52+jit(0.12), t2=0.14+jit(0.1);
    const lw1=0.5+rnd()*0.16, lw2=0.76+rnd()*0.14;
    S("M"+F(x+ln)+" "+F(y-h)+
      " L"+F(x-w*lw1+ln*0.6)+" "+F(y-h*t1)+" L"+F(x-w*0.26+ln*0.6)+" "+F(y-h*t1)+
      " L"+F(x-w*lw2+ln*0.25)+" "+F(y-h*t2)+" L"+F(x-w*0.4+ln*0.25)+" "+F(y-h*t2)+
      " L"+F(x-w)+" "+F(y+h*0.24)+" L"+F(x+w)+" "+F(y+h*0.24)+
      " L"+F(x+w*0.4+ln*0.25)+" "+F(y-h*t2)+" L"+F(x+w*lw2+ln*0.25)+" "+F(y-h*t2)+
      " L"+F(x+w*0.26+ln*0.6)+" "+F(y-h*t1)+" L"+F(x+w*lw1+ln*0.6)+" "+F(y-h*t1)+" Z",0.85,fill);
    S("M"+F(x+ln*0.15)+" "+F(y+h*0.24)+" l 0 "+F(Math.min(3,h*0.3)),0.85);
  };
  const broad=(x,y,s,fill)=>{
    S("M"+F(x-s)+" "+F(y)+
      " Q "+F(x-s*1.15)+" "+F(y-s*0.75)+" "+F(x-s*0.3)+" "+F(y-s*0.85)+
      " Q "+F(x-s*0.05)+" "+F(y-s*1.35)+" "+F(x+s*0.5)+" "+F(y-s*0.8)+
      " Q "+F(x+s*1.25)+" "+F(y-s*0.7)+" "+F(x+s*0.95)+" "+F(y-s*0.05)+
      " Q "+F(x+s*0.75)+" "+F(y+s*0.3)+" "+F(x+s*0.2)+" "+F(y+s*0.12)+
      " Q "+F(x-s*0.4)+" "+F(y+s*0.35)+" "+F(x-s)+" "+F(y)+" Z",0.85,fill);
    S("M"+F(x)+" "+F(y+s*0.2)+" l 0 "+F(s*0.45),0.85);
  };
  const tuft=(x,y)=>{
    const g=1.3+rnd()*1.1, ext=6.5+rnd()*2;
    S("M"+F(x-ext-1)+" "+F(y)+" L"+F(x-g)+" "+F(y),0.85);
    S("M"+F(x+g)+" "+F(y)+" L"+F(x+ext+1)+" "+F(y),0.85);
    const nb=3+Math.floor(rnd()*3);
    for(let i=0;i<nb;i++){
      const fx=(nb>1)?((i-(nb-1)/2)/((nb-1)/2)):0;
      const bx=x+fx*(2+rnd()), len=4.5+rnd()*2.2;
      S("M"+F(bx)+" "+F(y)+" L"+F(bx+fx*(1.5+rnd()*1.6)+jit(0.8))+" "+F(y-len),0.85);
    }
    dot(x-9.5+jit(2),y+1,0.6); dot(x+9.5+jit(2),y+0.5,0.6);
  };
  const ripple=(x,y,len)=>{
    const a1=1.6+rnd()*1.4, l1=len*(0.42+rnd()*0.16);
    S("M"+F(x)+" "+F(y)+" q "+F(l1*0.5)+" "+F(-a1)+" "+F(l1)+" 0 q "+F((len-l1)*0.5)+" "+F(a1*0.9)+" "+F(len-l1)+" 0",0.85);
  };
  const house=(x,y,s)=>{
    const a=s*(0.95+rnd()*0.4), hw=s*(0.7+rnd()*0.4), hr2=s*(0.7+rnd()*0.55), rx=jit(s*0.8);
    const j2=()=>jit(1);
    out+='<path d="M'+F(x-a+j2())+' '+F(y+j2()*0.5)+
      ' L'+F(x-a+j2())+' '+F(y-hw+j2())+
      ' L'+F(x+rx)+' '+F(y-hw-hr2+j2())+
      ' L'+F(x+a+j2())+' '+F(y-hw+j2())+
      ' L'+F(x+a+j2())+' '+F(y+j2()*0.5)+' Z" fill="'+INKD+'" pointer-events="none"/>';
  };
  const tower=(x,y,s)=>{
    const a=s*(0.6+rnd()*0.25), ht=s*(2.2+rnd()*0.8), rt=s*(0.6+rnd()*0.5);
    out+='<path d="M'+F(x-a)+' '+F(y)+' L'+F(x-a+jit(1))+' '+F(y-ht)+' L'+F(x+jit(1.2))+' '+F(y-ht-rt)+' L'+F(x+a+jit(1))+' '+F(y-ht)+' L'+F(x+a)+' '+F(y)+' Z" fill="'+INKD+'" pointer-events="none"/>';
    S("M"+F(x)+" "+F(y-ht-rt)+" L"+F(x+s*(1.2+rnd()*0.5))+" "+F(y-ht-rt+s*0.4),0.7);
  };

  if(t==="m"){
    const f=FILLS.m;
    peak(cx+jit(5), cy-3+jit(4), 12.5+rnd()*3.5, f);
    peak(cx-9+jit(4), cy+8+jit(3), 8+rnd()*2.5, f);
    if(rnd()>0.6) hillArc(cx+11+jit(4), cy+10+jit(2), 4.5+rnd(), f);
  } else if(t==="h"){
    hillArc(cx-8+jit(7), cy-6+jit(4), 6+rnd()*2.6, FILLS.h);
    hillArc(cx+9+jit(7), cy-2+jit(4), 6.5+rnd()*2.6, FILLS.h);
    if(rnd()>0.15) hillArc(cx+jit(9), cy+9+jit(4), 5.5+rnd()*2.4, FILLS.h);
  } else if(t==="f"||t==="F"){
    const dense=(t==="F"), fl=FILLS[t];
    const n=(dense?10:6)+Math.floor(rnd()*3), pts=[];
    for(let i=0;i<n;i++) pts.push([cx+jit(R*(dense?1.2:1.05)), cy+jit(R*(dense?1:0.85))]);
    pts.sort((a,b)=>a[1]-b[1]);
    for(const [x,y] of pts){
      const h=(dense?7.5:7)+((y-cy)/R+0.5)*3+rnd()*1.5;
      if(rnd()<(dense?0.07:0.12)) broad(x,y,h*0.42,fl); else pine(x,y,h,fl);
    }
  } else if(t==="d"){
    const n=2+(rnd()>0.5?1:0);
    for(let i=0;i<n;i++){
      const x=cx+jit(24), y=cy-5+i*9+jit(4), b=7+rnd()*3.5;
      S("M"+F(x-b)+" "+F(y)+" Q "+F(x+jit(3))+" "+F(y-b*(0.45+rnd()*0.2))+" "+F(x+b)+" "+F(y)+" q "+F(b*0.25)+" "+F(0.6+rnd()*0.6)+" "+F(b*0.5)+" "+F(0.9),0.9,FILLS.d);
    }
    for(let i=0;i<2;i++){
      const x=cx+jit(26), y=cy+jit(16);
      dot(x,y,0.55); dot(x+3+jit(1),y+1.5,0.5); dot(x+6+jit(1),y-0.5,0.55); dot(x+1.5,y+3.5,0.45);
    }
  } else if(t==="s"){
    const n=2+(rnd()>0.55?1:0);
    for(let i=0;i<n;i++) tuft(cx+jit(28), cy-6+i*10+jit(4));
  } else if(t==="w"){
    let coast="";
    const DIRS=(hr%2===0)
      ? {0:[hr,hc+1],1:[hr+1,hc],2:[hr+1,hc-1],3:[hr,hc-1],4:[hr-1,hc-1],5:[hr-1,hc]}
      : {0:[hr,hc+1],1:[hr+1,hc+1],2:[hr+1,hc],3:[hr,hc-1],4:[hr-1,hc],5:[hr-1,hc+1]};
    let coastCount=0;
    for(let e=0;e<6;e++){
      const nb=DIRS[e], nt=terAt2?terAt2(nb[0],nb[1]):null;
      if(!nt||nt==="w") continue;
      coastCount++;
      const p1=corner(cx,cy,e), p2=corner(cx,cy,(e+1)%6);
      const mx=(p1[0]+p2[0])/2, my=(p1[1]+p2[1])/2;
      const vx=(cx-mx), vy=(cy-my), vl=Math.hypot(vx,vy);
      const ux=vx/vl, uy=vy/vl;
      const bul=1+rnd()*2.2;
      S("M"+F(p1[0])+" "+F(p1[1])+" Q "+F(mx-ux*bul)+" "+F(my-uy*bul)+" "+F(p2[0])+" "+F(p2[1]),1.6);
      for(let k=1;k<=2;k++){
        const ox=ux*4.2*k, oy=uy*4.2*k;
        const shr=0.08+0.12*k;
        const q1=[p1[0]+(p2[0]-p1[0])*shr+ox, p1[1]+(p2[1]-p1[1])*shr+oy];
        const q2=[p2[0]+(p1[0]-p2[0])*shr+ox, p2[1]+(p1[1]-p2[1])*shr+oy];
        S("M"+F(q1[0])+" "+F(q1[1])+" Q "+F((q1[0]+q2[0])/2+ux*1.1)+" "+F((q1[1]+q2[1])/2+uy*1.1)+" "+F(q2[0])+" "+F(q2[1]),0.8);
      }
    }
    const nrip=coastCount>3?1:2;
    for(let i=0;i<nrip;i++){const len=18+rnd()*6; ripple(cx-len*0.55+jit(5), cy-5+i*8+jit(3), len);}
  } else if(t==="p"){
    if(rnd()<0.75){
      const x=cx+jit(24), y=cy+jit(14), l1=3+rnd()*1.4;
      S("M"+F(x)+" "+F(y)+" q "+F(jit(1.4))+" "+F(-l1*0.75)+" "+F(jit(1))+" "+F(-l1)+
        " M"+F(x-2.4)+" "+F(y)+" q -1 -1.8 "+F(-1.5-rnd())+" "+F(-1.9-rnd())+
        " M"+F(x+2.4)+" "+F(y)+" q 1 -1.8 "+F(1.5+rnd())+" "+F(-1.9-rnd()),0.75);
    }
    if(rnd()<0.7){const x=cx+jit(24), y=cy+jit(14); dot(x,y,0.6); dot(x+3.5,y+1,0.55); dot(x+7,y-0.6,0.6); dot(x+1.5,y+2.6,0.5);}
    if(rnd()<0.35){const x=cx+jit(22), y=cy+jit(13); dot(x,y,0.55); dot(x+3,y-1,0.5);}
  } else if(t==="v"){
    S("M"+F(cx-19)+" "+F(cy+8+jit(3))+" Q "+F(cx+jit(6))+" "+F(cy-2+jit(3))+" "+F(cx+19)+" "+F(cy+6+jit(3)),0.75);
    house(cx-11+jit(3), cy+3+jit(2), 4+rnd()*0.8);
    house(cx+1+jit(3), cy-5+jit(2), 3.8+rnd()*0.8);
    house(cx+12+jit(3), cy+2+jit(2), 4+rnd()*0.9);
    house(cx-2+jit(3), cy+13+jit(2), 3.6+rnd()*0.8);
    dot(cx+16+jit(3), cy-10+jit(2), 0.6); dot(cx-15+jit(3), cy+12+jit(2), 0.6);
  } else if(t==="c"){
    S("M"+F(cx-17)+" "+F(cy+8+jit(2))+" L"+F(cx+17)+" "+F(cy+9+jit(2)),0.6);
    S("M"+F(cx-15)+" "+F(cy-6+jit(2))+" L"+F(cx+15)+" "+F(cy-7+jit(2)),0.6);
    const cells=[[-14,-11],[1,-13],[13,-9],[-15,2],[-1,-1],[12,3],[-8,14],[5,15]];
    for(const cell of cells){
      if(rnd()<0.12) continue;
      const x=cx+cell[0]+jit(3), y=cy+cell[1]+jit(3);
      if(rnd()<0.22) tower(x,y,3+rnd()*0.9); else house(x,y,3.4+rnd()*1.4);
    }
  }
  return out;
}
// === END DECO v2 ===

// swatches (2x scale, one hex each)
const sw=document.getElementById("swatches");
const NAMES={p:"plains",f:"forest",F:"dense forest",h:"hills",m:"mountains",s:"marsh",w:"water",d:"desert",v:"village",c:"city"};
for(const t of ["m","h","f","F","s","w","p","d","v","c"]){
  const cx=R+4, cy=R+4, sc=2;
  sw.innerHTML+='<div class="sw"><svg width="'+((2*R+8)*sc)+'" height="'+((2*R+8)*sc)+'"><g transform="scale('+sc+')">'+
    '<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS[t]+'" stroke="#A99263" stroke-width="1"/>'+
    deco(t,cx,cy,2,3,null)+'</g></svg><div>'+NAMES[t]+'</div></div>';
}
for(const rv of [["p2p","river: point to point"],["e180","river: opposite edges"],["e120","river: 120&deg; bend"],["e60","river: 60&deg; bend"],["src","river: source"]]){
  const cx=R+4, cy=R+4, sc=2;
  sw.innerHTML+='<div class="sw"><svg width="'+((2*R+8)*sc)+'" height="'+((2*R+8)*sc)+'"><g transform="scale('+sc+')">'+
    '<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS.p+'" stroke="#A99263" stroke-width="1"/>'+
    riverSvg(rv[0],0,false,cx,cy)+'</g></svg><div>'+rv[1]+'</div></div>';
}
for(const rd of [["p2p","road: point to point"],["e180","road: opposite edges"],["e120","road: 120&deg; bend"],["e60","road: 60&deg; bend"],["src","road: terminus"]]){
  const cx=R+4, cy=R+4, sc=2;
  sw.innerHTML+='<div class="sw"><svg width="'+((2*R+8)*sc)+'" height="'+((2*R+8)*sc)+'"><g transform="scale('+sc+')">'+
    '<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS.p+'" stroke="#A99263" stroke-width="1"/>'+
    roadSvg(rd[0],0,false,cx,cy)+'</g></svg><div>'+rd[1]+'</div></div>';
}
for(const st of ["beach","cliff"]){
  for(let k=1;k<=6;k++){
    const cx=R+4, cy=R+4, sc=2, edges=[];
    for(let e=0;e<k;e++) edges.push((e+1)%6);
    sw.innerHTML+='<div class="sw"><svg width="'+((2*R+8)*sc)+'" height="'+((2*R+8)*sc)+'"><g transform="scale('+sc+')">'+
      '<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS.p+'" stroke="#A99263" stroke-width="1"/>'+
      coastSvg(st,edges,cx,cy,1,k)+'</g></svg><div>'+(st==="beach"?"sand beach":"cliffs")+': '+k+' edge'+(k>1?'s':'')+'</div></div>';
  }
}

// full map, all explored
let hexes="";
for(let r=0;r<NR;r++)for(let c=0;c<COLS;c++){
  const [cx,cy]=ctr(r,c), t=ROWS[r][c];
  hexes+='<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS[t]+'" stroke="#A99263" stroke-width="1"/>'+deco(t,cx,cy,r,c,terAt);
}
for(const co of LABCOAST){const [cx,cy]=ctr(co.r,co.c);hexes+=coastSvg(co.style,co.edges,cx,cy,co.r,co.c);}
for(const rv of LABRIV){const [cx,cy]=ctr(rv.r,rv.c);hexes+=riverSvg(rv.k,rv.rot,rv.flip,cx,cy);}
for(const rd of LABROAD){const [cx,cy]=ctr(rd.r,rd.c);hexes+=roadSvg(rd.k,rd.rot,rd.flip,cx,cy);}
const W=Math.round(MX*2+COLS*HW+HW/2), H=Math.round(MY*2+2*R+(NR-1)*VS+14);
document.getElementById("map").innerHTML='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="border:1px solid #C6B287;border-radius:8px">'+hexes+'</svg>';
</script>
