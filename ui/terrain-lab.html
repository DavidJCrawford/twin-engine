<!doctype html>
<meta charset="utf-8">
<title>Twin terrain lab</title>
<style>
body{background:#F0E6CF;font-family:Georgia,serif;color:#3B3020;margin:18px}
h3{margin:0 0 10px;font-weight:normal}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.sw{border:1px solid #C6B287;border-radius:8px;background:#F0E6CF;text-align:center;font-size:12px;padding:4px}
</style>
<h3>Terrain lab — deco v2</h3>
<div class="row" id="swatches"></div>
<div id="map"></div>
<script>
const FILLS={p:"#DDE0B5",f:"#AEC08B",h:"#E3CB9B",m:"#C9BBA3",s:"#BCCDB4",w:"#AAC5C6"};
const ROWS=["mmmhhffff","mhhhpffff","hhppppfff","ppppppffh","wwpppsssp","wwwpssssh"];
const R=34,HW=Math.sqrt(3)*R,VS=1.5*R,MX=14,MY=12,COLS=9,NR=6;
const ctr=(r,c)=>[MX+HW/2+c*HW+(r%2?HW/2:0),MY+R+r*VS];
const corner=(cx,cy,i)=>{const a=Math.PI/180*(60*i-30);return[cx+R*0.965*Math.cos(a),cy+R*0.965*Math.sin(a)];};
const hexPts=(cx,cy)=>{let a=[];for(let i=0;i<6;i++){const p=corner(cx,cy,i);a.push(p[0].toFixed(1)+","+p[1].toFixed(1));}return a.join(" ");};
const terAt=(r,c)=>(r>=0&&r<NR&&c>=0&&c<COLS)?ROWS[r][c]:null;

// === DECO v2 ===
const INKD="rgba(45,36,22,0.82)";
function rngFor(hr,hc){let s=((hr*73856093)^(hc*19349663)^0x9e3779b9)>>>0;return()=>{s=(s*1103515245+12345)>>>0;return s/4294967296;};}
function deco(t,cx,cy,hr,hc,terAt2){
  const rnd=rngFor(hr,hc), jit=a=>(rnd()-0.5)*a;
  let out="";
  const S=(d,w,fill)=>{out+='<path d="'+d+'" fill="'+(fill||"none")+'" stroke="'+INKD+'" stroke-width="'+(w||1)+'" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>';};
  const dot=(x,y,r2)=>{out+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(r2||0.7)+'" fill="'+INKD+'" pointer-events="none"/>';};
  const F=n=>n.toFixed(1);

  const peak=(x,y,s,fill)=>{
    const a1x=x-s*0.12+jit(s*0.2), a1y=y-s*0.85;
    const sdx=x+s*0.1, sdy=y-s*0.42;
    const a2x=x+s*0.36, a2y=y-s*0.6;
    S("M"+F(x-s)+" "+F(y+s*0.6)+" L"+F(a1x)+" "+F(a1y)+" L"+F(sdx)+" "+F(sdy)+
      " L"+F(a2x)+" "+F(a2y)+" L"+F(x+s*0.95)+" "+F(y+s*0.6),1.1,fill);
    for(let k=0;k<3;k++){
      const f=0.28+k*0.21;
      const px=a1x+(x+s*0.95-a1x)*f, py=a1y+(y+s*0.6-a1y)*f;
      S("M"+F(px)+" "+F(py)+" l "+F(-s*0.2)+" "+F(s*0.24),0.8);
    }
  };
  const hillArc=(x,y,b,fill)=>{
    S("M"+F(x-b)+" "+F(y)+" Q "+F(x+jit(2))+" "+F(y-b*1.25)+" "+F(x+b)+" "+F(y),1.1,fill);
    S("M"+F(x+b*0.2)+" "+F(y-b*0.42)+" L"+F(x+b*0.55)+" "+F(y-b*0.08),0.8);
    S("M"+F(x+b*0.02)+" "+F(y-b*0.6)+" L"+F(x+b*0.32)+" "+F(y-b*0.28),0.8);
  };
  const pine=(x,y,h,fill)=>{
    const w=h*0.52;
    S("M"+F(x)+" "+F(y-h)+
      " L"+F(x-w*0.55)+" "+F(y-h*0.52)+" L"+F(x-w*0.26)+" "+F(y-h*0.52)+
      " L"+F(x-w*0.82)+" "+F(y-h*0.14)+" L"+F(x-w*0.4)+" "+F(y-h*0.14)+
      " L"+F(x-w)+" "+F(y+h*0.24)+" L"+F(x+w)+" "+F(y+h*0.24)+
      " L"+F(x+w*0.4)+" "+F(y-h*0.14)+" L"+F(x+w*0.82)+" "+F(y-h*0.14)+
      " L"+F(x+w*0.26)+" "+F(y-h*0.52)+" L"+F(x+w*0.55)+" "+F(y-h*0.52)+" Z",0.85,fill);
    S("M"+F(x)+" "+F(y+h*0.24)+" l 0 "+F(Math.min(3,h*0.3)),0.85);
  };
  const broad=(x,y,s,fill)=>{
    S("M"+F(x-s)+" "+F(y)+
      " Q "+F(x-s*1.15)+" "+F(y-s*0.75)+" "+F(x-s*0.3)+" "+F(y-s*0.85)+
      " Q "+F(x-s*0.05)+" "+F(y-s*1.35)+" "+F(x+s*0.5)+" "+F(y-s*0.8)+
      " Q "+F(x+s*1.25)+" "+F(y-s*0.7)+" "+F(x+s*0.95)+" "+F(y-s*0.05)+
      " Q "+F(x+s*0.75)+" "+F(y+s*0.3)+" "+F(x+s*0.2)+" "+F(y+s*0.12)+
      " Q "+F(x-s*0.4)+" "+F(y+s*0.35)+" "+F(x-s)+" "+F(y)+" Z",0.85,fill);
    S("M"+F(x)+" "+F(y+s*0.2)+" l 0 "+F(s*0.45),0.85);
  };
  const tuft=(x,y)=>{
    S("M"+F(x-7)+" "+F(y)+" L"+F(x-1.6)+" "+F(y),0.85);
    S("M"+F(x+1.6)+" "+F(y)+" L"+F(x+7)+" "+F(y),0.85);
    S("M"+F(x)+" "+F(y)+" L"+F(x)+" "+F(y-6.2),0.85);
    S("M"+F(x-2.4)+" "+F(y)+" L"+F(x-4.6)+" "+F(y-4.6),0.85);
    S("M"+F(x+2.4)+" "+F(y)+" L"+F(x+4.6)+" "+F(y-4.6),0.85);
    S("M"+F(x-1.1)+" "+F(y)+" L"+F(x-1.9)+" "+F(y-5.4),0.85);
    S("M"+F(x+1.1)+" "+F(y)+" L"+F(x+1.9)+" "+F(y-5.4),0.85);
    dot(x-9.5+jit(2),y+1,0.6); dot(x+9.5+jit(2),y+0.5,0.6);
  };
  const ripple=(x,y,len)=>{
    S("M"+F(x)+" "+F(y)+" q "+F(len*0.25)+" -2.2 "+F(len*0.5)+" 0 q "+F(len*0.25)+" 2.2 "+F(len*0.5)+" 0",0.85);
  };
  const grass=(x,y)=>{S("M"+F(x)+" "+F(y)+" l 2.1 -3.6 M"+F(x+3.6)+" "+F(y)+" l 2.1 -3.6",0.8);};

  if(t==="m"){
    const f=FILLS.m;
    peak(cx+jit(4), cy-3+jit(3), 13.5+rnd()*2, f);
    peak(cx-9+jit(3), cy+8+jit(2), 8.5+rnd()*1.5, f);
    if(rnd()>0.7) hillArc(cx+11+jit(3), cy+10, 4.5, f);
  } else if(t==="h"){
    hillArc(cx-8+jit(6), cy-6+jit(3), 6.5+rnd()*2, FILLS.h);
    hillArc(cx+9+jit(6), cy-2+jit(3), 7+rnd()*2, FILLS.h);
    hillArc(cx+jit(8), cy+9+jit(3), 6+rnd()*2, FILLS.h);
  } else if(t==="f"){
    const n=6+Math.floor(rnd()*3), pts=[];
    for(let i=0;i<n;i++) pts.push([cx+jit(R*1.05), cy+jit(R*0.85)]);
    pts.sort((a,b)=>a[1]-b[1]);
    for(const [x,y] of pts){
      const h=7+((y-cy)/R+0.5)*3+rnd()*1.5;
      if(rnd()<0.12) broad(x,y,h*0.42,FILLS.f); else pine(x,y,h,FILLS.f);
    }
  } else if(t==="s"){
    const n=2+(rnd()>0.55?1:0);
    for(let i=0;i<n;i++) tuft(cx+jit(28), cy-6+i*10+jit(4));
  } else if(t==="w"){
    let coast="";
    const DIRS=(hr%2===0)
      ? {0:[hr,hc+1],1:[hr+1,hc],2:[hr+1,hc-1],3:[hr,hc-1],4:[hr-1,hc-1],5:[hr-1,hc]}
      : {0:[hr,hc+1],1:[hr+1,hc+1],2:[hr+1,hc],3:[hr,hc-1],4:[hr-1,hc],5:[hr-1,hc+1]};
    let coastCount=0;
    for(let e=0;e<6;e++){
      const nb=DIRS[e], nt=terAt2?terAt2(nb[0],nb[1]):null;
      if(!nt||nt==="w") continue;
      coastCount++;
      const p1=corner(cx,cy,e), p2=corner(cx,cy,(e+1)%6);
      const mx=(p1[0]+p2[0])/2, my=(p1[1]+p2[1])/2;
      const vx=(cx-mx), vy=(cy-my), vl=Math.hypot(vx,vy);
      const ux=vx/vl, uy=vy/vl;
      const bul=1.2+rnd()*1.4;
      S("M"+F(p1[0])+" "+F(p1[1])+" Q "+F(mx-ux*bul)+" "+F(my-uy*bul)+" "+F(p2[0])+" "+F(p2[1]),1.6);
      for(let k=1;k<=2;k++){
        const ox=ux*4.2*k, oy=uy*4.2*k;
        const shr=0.08+0.12*k;
        const q1=[p1[0]+(p2[0]-p1[0])*shr+ox, p1[1]+(p2[1]-p1[1])*shr+oy];
        const q2=[p2[0]+(p1[0]-p2[0])*shr+ox, p2[1]+(p1[1]-p2[1])*shr+oy];
        S("M"+F(q1[0])+" "+F(q1[1])+" Q "+F((q1[0]+q2[0])/2+ux*1.1)+" "+F((q1[1]+q2[1])/2+uy*1.1)+" "+F(q2[0])+" "+F(q2[1]),0.8);
      }
    }
    const nrip=coastCount>3?1:2;
    for(let i=0;i<nrip;i++){const len=18+rnd()*6; ripple(cx-len*0.55+jit(5), cy-5+i*8+jit(3), len);}
  } else if(t==="p"){
    if(rnd()<0.75){
      const x=cx+jit(24), y=cy+jit(14);
      S("M"+F(x)+" "+F(y)+" q 0.6 -2.6 0 -3.4 M"+F(x-2.4)+" "+F(y)+" q -1 -1.8 -1.8 -2.2 M"+F(x+2.4)+" "+F(y)+" q 1 -1.8 1.8 -2.2",0.75);
    }
    if(rnd()<0.7){const x=cx+jit(24), y=cy+jit(14); dot(x,y,0.6); dot(x+3.5,y+1,0.55); dot(x+7,y-0.6,0.6); dot(x+1.5,y+2.6,0.5);}
    if(rnd()<0.35){const x=cx+jit(22), y=cy+jit(13); dot(x,y,0.55); dot(x+3,y-1,0.5);}
  }
  return out;
}
// === END DECO v2 ===

// swatches (2x scale, one hex each)
const sw=document.getElementById("swatches");
const NAMES={p:"plains",f:"forest",h:"hills",m:"mountains",s:"marsh",w:"water"};
for(const t of ["m","h","f","s","w","p"]){
  const cx=R+4, cy=R+4, sc=2;
  sw.innerHTML+='<div class="sw"><svg width="'+((2*R+8)*sc)+'" height="'+((2*R+8)*sc)+'"><g transform="scale('+sc+')">'+
    '<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS[t]+'" stroke="#A99263" stroke-width="1"/>'+
    deco(t,cx,cy,2,3,null)+'</g></svg><div>'+NAMES[t]+'</div></div>';
}

// full map, all explored
let hexes="";
for(let r=0;r<NR;r++)for(let c=0;c<COLS;c++){
  const [cx,cy]=ctr(r,c), t=ROWS[r][c];
  hexes+='<polygon points="'+hexPts(cx,cy)+'" fill="'+FILLS[t]+'" stroke="#A99263" stroke-width="1"/>'+deco(t,cx,cy,r,c,terAt);
}
const W=Math.round(MX*2+COLS*HW+HW/2), H=Math.round(MY*2+2*R+(NR-1)*VS+14);
document.getElementById("map").innerHTML='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="border:1px solid #C6B287;border-radius:8px">'+hexes+'</svg>';
</script>
