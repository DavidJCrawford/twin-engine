<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
.tc-frame { background:#F0E6CF; border:1px solid #C6B287; border-radius:12px; padding:5px; }
.tc-inner { border:1px solid #D9CBA6; border-radius:8px; padding:14px 16px 12px; }
.tc-head { font-family:'IM Fell English SC',serif; font-size:22px; color:#3B3020; line-height:1.15; }
.tc-sub { font-family:'IM Fell English',serif; font-style:italic; font-size:14px; color:#6B5A3E; margin-top:1px; }
.tc-chips { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 12px; }
.tc-chip { font-family:'IM Fell English',serif; font-size:13px; color:#3B3020; border:1px solid #BCA97E; border-radius:6px; padding:3px 10px; background:#EBDFC2; }
.tc-chip i { font-style:normal; color:#6B5A3E; margin-right:2px; }
.tc-chip i::after { content:": "; }
.tc-prose { font-family:'IM Fell English',serif; font-size:15px; color:#3B3020; line-height:1.65; margin:0 0 10px; }
.tc-prompt { font-family:'IM Fell English',serif; font-style:italic; font-size:14.5px; color:#6B5A3E; margin:2px 0 10px; }
.tc-stack { display:flex; flex-direction:column; gap:8px; }
button.tc-choice { display:block; width:100%; text-align:left; font-family:'IM Fell English',serif;
  background:#EBDFC2 !important; border:1px solid #A98F5F !important; border-radius:6px;
  padding:9px 14px 8px; cursor:pointer; height:auto; color:#3B3020 !important; }
button.tc-choice:hover { background:#E2D2AC !important; }
.tc-choice .lbl { display:block; font-size:15px; color:#5A2B20; }
.tc-choice .dtl { display:block; font-size:13px; color:#6B5A3E; margin-top:2px; line-height:1.45; }
.tc-quill { font-family:'IM Fell English',serif; font-style:italic; font-size:12.5px; color:#6B5A3E; margin-top:10px; }
</style>
<div id="tc-root"></div>
<script>
const STATE = /*__STATE__*/null;

const DEMO_STATE = {
  location: "Barrowford",
  date: "First day of Frostfall, 1211",
  weather: "Clear and cold; woodsmoke hangs over the thatch",
  stats: [
    {label:"Season",value:"Frostfall"},
    {label:"Supplies",value:"6 days"},
    {label:"Weariness",value:"rested"},
    {label:"Company",value:"alone"}
  ],
  prose: [
    "Morning takes the lane slowly, the frost giving way stone by stone. Smoke stands straight over every roof, and somewhere behind the byres a dog is making an argument nobody joins."
  ],
  prompt: "The morning is yours.",
  choices: [
    {label: "Ask for news at the inn",
     detail: "Maren hears everything twice before noon; a cup of small beer buys the second telling.",
     prompt: "Take a cup at the Ford Inn and listen for news."},
    {label: "Walk the market",
     detail: "The last market before the fair — see what coin is doing, and who is spending it.",
     prompt: "Walk the Barrowford market and see what is being bought and said."},
    {label: "Set out at dawn",
     detail: "The roads will not get shorter for waiting, and the season will not get kinder.",
     prompt: "I want to set out at dawn. What roads are open to me?"}
  ]
};

(function(){
  const S = STATE || DEMO_STATE;
  const say = t => (typeof sendPrompt === "function" ? sendPrompt(t) : console.log("[sendPrompt]", t));
  const esc = t => String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;");
  let html = '<div class="tc-frame"><div class="tc-inner">';
  if(S.location) html += '<div class="tc-head">'+esc(S.location)+'</div>';
  if(S.date||S.weather) html += '<div class="tc-sub">'+esc(S.date||"")+(S.date&&S.weather?' &middot; ':'')+esc(S.weather||"")+'</div>';
  if(S.stats&&S.stats.length) html += '<div class="tc-chips">'+S.stats.map(s=>'<span class="tc-chip"><i>'+esc(s.label)+'</i>'+esc(s.value)+'</span>').join("")+'</div>';
  (S.prose||[]).forEach(p=>{ html += '<p class="tc-prose">'+esc(p)+'</p>'; });
  if(S.prompt) html += '<p class="tc-prompt">'+esc(S.prompt)+'</p>';
  html += '<div class="tc-stack">';
  (S.choices||[]).forEach((c,i)=>{
    html += '<button class="tc-choice" data-i="'+i+'">'+
      '<span class="lbl">'+esc(c.label)+' &#8599;</span>'+
      '<span class="dtl">'+esc(c.detail||"")+'</span></button>';
  });
  html += '</div><p class="tc-quill">&hellip;or write your own &mdash; the quill is always yours.</p></div></div>';
  document.getElementById("tc-root").innerHTML = html;
  document.querySelectorAll("#tc-root .tc-choice").forEach(b=>
    b.addEventListener("click",()=>say(S.choices[+b.dataset.i].prompt)));
})();
</script>
